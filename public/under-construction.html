<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Signs NC — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .logo-wrap {
      background: #ffffff;
      display: inline-block;
      border-radius: 16px;
      padding: 16px 24px;
      margin-bottom: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .logo-wrap img {
      height: 72px;
      width: auto;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f9fafb;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 1.05rem;
      color: #9ca3af;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .phone-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #16a34a;
      color: #ffffff;
      text-decoration: none;
      font-size: 1.25rem;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 12px;
      letter-spacing: 0.02em;
      transition: background 0.2s;
    }

    .phone-btn:hover { background: #15803d; }

    .phone-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .tagline {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .enter-link {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #374151;
      text-decoration: none;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .enter-link:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/images/allsignslogo.jpg" alt="All Signs NC" />
    </div>

    <h1>Our New Site Is on the Way</h1>

    <p>
      We're putting the finishing touches on something great.<br />
      In the meantime, we're still open and ready to help.
    </p>

    <a href="tel:+19103233115" class="phone-btn">
      <svg class="phone-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.19h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.88a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      910-323-3115
    </a>

    <p class="tagline">All Signs NC &mdash; Fayetteville, NC</p>

    <a href="/home" class="enter-link">Enter Site &rarr;</a>
  </div>
</body>
</html>
